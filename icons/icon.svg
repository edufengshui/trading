<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Trading Calculator">
  <rect width="512" height="512" rx="96" fill="#0e1022"/>
  <rect x="56" y="56" width="400" height="400" rx="40" fill="none" stroke="#2c3258" stroke-width="6"/>
  <!-- 12-palace ring suggestion: four corner ticks + cardinal ticks -->
  <g stroke="#5b618a" stroke-width="5" stroke-linecap="round">
    <line x1="176" y1="56" x2="176" y2="96"/><line x1="256" y1="56" x2="256" y2="96"/><line x1="336" y1="56" x2="336" y2="96"/>
    <line x1="176" y1="416" x2="176" y2="456"/><line x1="256" y1="416" x2="256" y2="456"/><line x1="336" y1="416" x2="336" y2="456"/>
    <line x1="56" y1="176" x2="96" y2="176"/><line x1="56" y1="256" x2="96" y2="256"/><line x1="56" y1="336" x2="96" y2="336"/>
    <line x1="416" y1="176" x2="456" y2="176"/><line x1="416" y1="256" x2="456" y2="256"/><line x1="416" y1="336" x2="456" y2="336"/>
  </g>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#d9b15e" stroke-width="4" opacity="0.55"/>
  <!-- 壬 (day master stem of the reference chart) in cinnabar -->
  <text x="256" y="258" text-anchor="middle" dominant-baseline="central"
        font-family="Songti SC, STSong, SimSun, serif" font-size="220" fill="#d8453f">壬</text>
</svg>
